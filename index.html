<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>CAT INVADERS — Toothbrush Timer</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
  font-family:"Segoe UI",sans-serif;
  color:white;
  text-transform:uppercase;
}
#game{
  position:fixed;
  inset:0;
}
.hud{
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}
.hud-box{
  background:rgba(0,0,0,0.6);
  padding:8px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  font-weight:700;
}
#hitText{
  position:fixed;
  left:50%;
  bottom:22%;
  transform:translateX(-50%);
  font-size:2.4rem;
  font-weight:900;
  color:#ff4f6d;
  text-shadow:0 0 20px #ff4f6d;
  display:none;
  z-index:20;
}
#centerText{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:3rem;
  font-weight:900;
  color:#ffe66d;
  text-shadow:0 0 20px #ffe66d;
  display:none;
  z-index:20;
}
.controls{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}
.btn{
  padding:10px 18px;
  border-radius:999px;
  border:0;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(135deg,#ff2f92,#ff8a00);
  color:#000;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="hud">
  <div class="hud-box">
    <div>PILOT</div>
    <div>HOLLIE</div>
  </div>
  <div class="hud-box">
    <div>TIMER</div>
    <div id="timer">02:00</div>
  </div>
  <div class="hud-box">
    <div>SCORE</div>
    <div id="score">0</div>
  </div>
</div>

<div id="hitText">HIT!</div>
<div id="centerText">3</div>

<div class="controls">
  <button id="startBtn" class="btn">START</button>
  <button id="resetBtn" class="btn">RESET</button>
</div>

<script>
/* SPRITES — all loaded from ROOT */
const spritePaths = {
  background: "background.png",
  idle_front: "idle_front.png",
  idle_left: "idle_left.png",
  idle_right: "idle_right.png",
  hit: "hit_reaction_comical.png",
  Cat1: "Cat1.png",
  Cat2: "Cat2.png",
  Cat3: "Cat3.png",
  Cat4: "Cat4.png"
};

const sprites = {};
let toLoad = Object.keys(spritePaths).length;
let loaded = false;

for (const k in spritePaths){
  const img = new Image();
  img.src = spritePaths[k];
  img.onload = () => { toLoad--; if(toLoad===0) loaded=true; };
  sprites[k] = img;
}

/* MUSIC — also loaded from ROOT */
const music = new Audio("EVEN FASTER.wav");
music.loop = true;
music.volume = 0.7;

/* CANVAS */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* GAME STATE */
const TOTAL_TIME = 120;
const SCORE_PER_SECOND = 10;
const SCORE_PER_HIT = 5;

let running = false;
let missionTime = TOTAL_TIME;
let score = 0;

let enemies = [];
let spawnTimer = 0;

let shakeTime = 0;

/* LIMITS */
function leftLimit(){ return canvas.width * 0.10; }
function rightLimit(){ return canvas.width * 0.90; }

/* HOLLIE */
const hollie = {
  x: canvas.width/2,
  y: 0,
  direction: 1,
  speed: 120,
  targetX: canvas.width/2,
  mode: "idle",
  modeTimer: 0,
  changeTimer: 0,
  scale: canvas.width < 600 ? 0.18 : 0.22
};

/* RANDOM */
function rand(min,max){ return min + Math.random()*(max-min); }

/* CATS */
const catKeys = ["Cat1","Cat2","Cat3","Cat4"];

function spawnCat(){
  const key = catKeys[Math.floor(Math.random()*catKeys.length)];
  enemies.push({
    x: canvas.width * (0.10 + Math.random()*0.80),
    y: -40,
    vy: 140 + Math.random()*120,
    spriteKey: key,
    scale: canvas.width < 600 ? 0.18 : 0.22
  });
}

function drawCat(e){
  const img = sprites[e.spriteKey];
  if(!img || !img.complete) return;

  const w = img.width * e.scale;
  const h = img.height * e.scale;

  ctx.drawImage(img, e.x - w/2, e.y - h/2, w, h);
}

/* DRAW HOLLIE */
function drawHollie(){
  let img;

  if(hollie.mode==="hit"){
    img = sprites.hit;
  } else {
    if(hollie.direction > 0.1) img = sprites.idle_right;
    else if(hollie.direction < -0.1) img = sprites.idle_left;
    else img = sprites.idle_front;
  }

  if(!img || !img.complete) return;

  const w = img.width * hollie.scale;
  const h = img.height * hollie.scale;

  hollie.y = canvas.height - h - 20;

  ctx.drawImage(img, hollie.x-w/2, hollie.y, w, h);
}

/* RANDOM MOVEMENT */
function updateHollie(dt){
  hollie.changeTimer -= dt;
  if(hollie.changeTimer <= 0){
    hollie.changeTimer = rand(0.4,1.4);
    hollie.targetX = rand(leftLimit(), rightLimit());
    hollie.speed = rand(80,180);
  }

  const dx = hollie.targetX - hollie.x;
  if(Math.abs(dx) < 4){
    hollie.direction = 0;
  } else {
    hollie.direction = dx > 0 ? 1 : -1;
    hollie.x += hollie.direction * hollie.speed * dt;
  }

  if(hollie.x < leftLimit()) hollie.x = leftLimit();
  if(hollie.x > rightLimit()) hollie.x = rightLimit();
}

/* UPDATE */
function update(dt){
  if(!running) return;

  missionTime -= dt;
  if(missionTime < 0) missionTime = 0;

  const t = Math.floor(missionTime);
  const m = Math.floor(t/60);
  const s = t%60;
  document.getElementById("timer").textContent =
    `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

  score += SCORE_PER_SECOND * dt;
  if(score < 0) score = 0;
  document.getElementById("score").textContent = Math.floor(score);

  updateHollie(dt);

  spawnTimer -= dt;
  if(spawnTimer <= 0){
    spawnCat();
    spawnTimer = 0.7;
  }

  if(hollie.mode==="hit"){
    hollie.modeTimer -= dt;
    if(hollie.modeTimer <= 0){
      hollie.mode="idle";
      document.getElementById("hitText").style.display="none";
    }
  }

  const hitLine = hollie.y + 20;

  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    e.y += e.vy*dt;

    if(e.y >= hitLine){
      enemies.splice(i,1);

      score -= SCORE_PER_HIT;
      if(score < 0) score = 0;
      document.getElementById("score").textContent = Math.floor(score);

      hollie.mode="hit";
      hollie.modeTimer=0.3;
      document.getElementById("hitText").style.display="block";

      shakeTime=0.2;
      continue;
    }

    if(e.y > canvas.height + 80){
      enemies.splice(i,1);
    }
  }

  if(missionTime <= 0){
    endMission();
  }
}

/* RENDER */
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let ox=0, oy=0;
  if(shakeTime>0){
    shakeTime -= 1/60;
    ox = (Math.random()*2-1)*6;
    oy = (Math.random()*2-1)*6;
  }
  ctx.save();
  ctx.translate(ox,oy);

  const bg = sprites.background;
  if(bg && bg.complete){
    const scale = Math.max(canvas.width/bg.width, canvas.height/bg.height);
    const bw = bg.width*scale;
    const bh = bg.height*scale;
    ctx.drawImage(bg, (canvas.width-bw)/2, (canvas.height-bh)/2, bw, bh);
  }

  drawHollie();
  enemies.forEach(drawCat);

  ctx.restore();
}

/* LOOP */
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05,(now-last)/1000);
  last = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* MISSION CONTROL */
function startCountdown(){
  let c=3;
  const ct=document.getElementById("centerText");
  ct.style.display="block";
  ct.textContent=c;

  const id=setInterval(()=>{
    c--;
    if(c<=0){
      clearInterval(id);
      ct.style.display="none";
      beginMission();
    } else {
      ct.textContent=c;
    }
  },1000);
}

function beginMission(){
  running=true;
  missionTime=TOTAL_TIME;
  score=0;
  enemies=[];
  hollie.mode="idle";
  hollie.modeTimer=0;
  document.getElementById("score").textContent="0";

  try{
    music.currentTime=0;
    music.play();
  }catch(e){}
}

function endMission(){
  running=false;
  document.getElementById("centerText").style.display="block";
  document.getElementById("centerText").textContent="DONE!";
  try{ music.pause(); }catch(e){}
}

/* BUTTONS */
document.getElementById("startBtn").onclick=()=>{
  if(!running) startCountdown();
};
document.getElementById("resetBtn").onclick=()=>{
  running=false;
  missionTime=TOTAL_TIME;
  score=0;
  enemies=[];
  hollie.mode="idle";
  hollie.modeTimer=0;
  document.getElementById("score").textContent="0";
  document.getElementById("timer").textContent="02:00";
  document.getElementById("centerText").style.display="none";
  document.getElementById("hitText").style.display="none";
  try{ music.pause(); }catch(e){}
};
  <script>
// ---------------------------------------------------------
// JENNIFER BOSS MODULE (self-contained, plugs into your game)
// ---------------------------------------------------------

// Load Jennifer sprite
const bossJennifer = new Image();
bossJennifer.src = "IMG_1476.png";

// Boss state
let bossActive = false;
let boss = {
  x: 0,
  y: -200,
  vx: 40,
  vy: 20,
  scale: 0.22, // same as Hollie on desktop
  patience: 30, // 30 seconds to survive
  attackTimer: 0,
  shockwaveTimer: 0,
  orbs: []
};

// Draw patience bar
function drawBossBar() {
  const w = canvas.width * 0.6;
  const h = 18;
  const x = (canvas.width - w) / 2;
  const y = 20;

  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(x, y, w, h);

  const pct = Math.max(0, boss.patience / 30);
  ctx.fillStyle = "#b36bff";
  ctx.fillRect(x, y, w * pct, h);

  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
}

// Spawn purple orb attack
function spawnOrb() {
  boss.orbs.push({
    x: boss.x,
    y: boss.y + 40,
    vy: 180,
    r: 10
  });
}

// Draw orbs
function drawOrbs(dt) {
  ctx.fillStyle = "#c08cff";
  for (let i = boss.orbs.length - 1; i >= 0; i--) {
    const o = boss.orbs[i];
    o.y += o.vy * dt;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fill();

    if (o.y > canvas.height + 50) {
      boss.orbs.splice(i, 1);
    }
  }
}

// Shockwave attack
function drawShockwave() {
  if (boss.shockwaveTimer > 0) {
    const t = boss.shockwaveTimer;
    const radius = (1 - t / 1.2) * canvas.width;

    const grad = ctx.createRadialGradient(
      boss.x, boss.y, 10,
      boss.x, boss.y, radius
    );
    grad.addColorStop(0, "rgba(200,150,255,0.4)");
    grad.addColorStop(1, "rgba(200,150,255,0)");

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Update boss logic
function updateBoss(dt) {
  if (!bossActive) return;

  // Drain patience
  boss.patience -= dt;
  if (boss.patience <= 0) {
    bossActive = false;
    score += 500; // bonus
    return;
  }

  // Entrance movement
  if (boss.y < canvas.height * 0.35) {
    boss.y += boss.vy * dt;
  } else {
    // Horizontal drift
    boss.x += boss.vx * dt;
    if (boss.x < canvas.width * 0.2 || boss.x > canvas.width * 0.8) {
      boss.vx *= -1;
    }
  }

  // Attacks
  boss.attackTimer -= dt;
  if (boss.attackTimer <= 0) {
    spawnOrb();
    boss.attackTimer = 0.8 + Math.random() * 0.6;
  }

  // Shockwave occasionally
  if (Math.random() < 0.002) {
    boss.shockwaveTimer = 1.2;
  }

  if (boss.shockwaveTimer > 0) {
    boss.shockwaveTimer -= dt;
  }
}

// Draw boss
function drawBoss() {
  if (!bossActive) return;

  // Draw Jennifer
  if (bossJennifer.complete) {
    const w = bossJennifer.width * boss.scale;
    const h = bossJennifer.height * boss.scale;
    ctx.drawImage(bossJennifer, boss.x - w / 2, boss.y - h / 2, w, h);
  }

  // Draw attacks
  drawOrbs(1 / 60);
  drawShockwave();

  // Draw patience bar
  drawBossBar();
}

// Hook into your existing update loop
const originalUpdate = update;
update = function(dt) {
  originalUpdate(dt);

  // Trigger boss at 30 seconds
  if (!bossActive && missionTime <= 30 && running) {
    bossActive = true;
    boss.x = canvas.width / 2;
    boss.y = -200;
    boss.patience = 30;
    boss.orbs = [];
  }

  updateBoss(dt);
};

// Hook into your existing render loop
const originalRender = render;
render = function() {
  originalRender();
  drawBoss();
};
</script>


</script>

</body>
</html>
